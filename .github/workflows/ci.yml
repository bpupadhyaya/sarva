name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-packages --group dev

      - name: Lint
        run: |
          uv run ruff check core/ tests/ foundry/ examples/
          uv run ruff format --check core/ tests/ foundry/ examples/

      - name: Test (mock provider only — no API keys in CI)
        run: uv run pytest tests/ -v

  web:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify core/sarva/server/static/ matches a fresh build
        # Catches the exact risk scripts/build-web.sh exists to prevent: a UI
        # source change committed without also running the build/copy step,
        # leaving `sarva serve` shipping a stale bundle silently.
        run: |
          if ! diff -rq dist ../../core/sarva/server/static; then
            echo "::error::core/sarva/server/static/ is stale — run ./scripts/build-web.sh and commit the result."
            exit 1
          fi

  desktop:
    # `cargo check` only — a fast compile/borrow-check pass, not a full
    # release build or cross-platform bundle (.dmg/.msi/.AppImage). Real
    # packaged installers for all platforms are T4 future work (see
    # BUILD-JOURNAL.md); this job exists to catch Rust-side regressions
    # cheaply on every push, not to produce release artifacts.
    #
    # Matrixed across all three target OSes: the sidecar spawn/kill code
    # in lib.rs is `#[cfg(unix)]`-gated in one place (the SIGINT/SIGTERM
    # handler) specifically because it was only ever verified on macOS —
    # this matrix at least catches the far cheaper failure mode of the
    # *rest* of the file not compiling on Linux/Windows at all, which
    # cargo check on a single OS can never surface.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        # Tauri 2's documented Linux prerequisites (webkit2gtk + friends) —
        # cargo check fails at the linking stage without these, not with a
        # clear "install this package" message, so they're listed here
        # explicitly rather than discovered by a confusing CI failure.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: cargo check
        run: cargo check --locked
