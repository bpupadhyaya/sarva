name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-packages --all-extras --group dev

      - name: Lint
        run: |
          uv run ruff check core/ tests/ foundry/ examples/
          uv run ruff format --check core/ tests/ foundry/ examples/

      - name: Test (mock provider only — no API keys in CI)
        run: uv run pytest tests/ -v

      - name: Verify installable wheels (a real pip install, not the dev workspace)
        # Every check above runs against `uv run`, which uses this repo's own
        # dev workspace venv directly -- it never actually proves the
        # published package METADATA is correct (entry points, dependency
        # list, which files get bundled). A real end user runs `pip install
        # sarva`, not `uv sync` inside a clone of this repo; this step is the
        # one place that actually exercises that path; a genuine, previously
        # unverified gap, confirmed once by hand before adding this step
        # (see BUILD-JOURNAL.md). This step can take a couple of minutes on a
        # cold runner -- torch's FIRST import after a fresh install spends
        # ~15-20s on macOS's Gatekeeper verifying the newly-extracted dylibs
        # are signed, confirmed directly while building this (a second
        # import in the same venv drops to well under a second) -- not a
        # hang, just a real one-time cost worth not being surprised by.
        run: |
          uv build --all-packages --out-dir dist
          # A real, previously-uncaught gap: neither pyproject.toml declared
          # a `license` field, so a real built wheel's METADATA had no
          # license info at all despite this being a real MIT-licensed repo
          # with a real LICENSE file -- confirmed by inspecting the actual
          # wheel, not assumed. Both now declare `license = "MIT"` and
          # `license-files = ["LICENSE"]` (each package keeps its own
          # in-tree copy -- hatchling's license-files globs can't reach
          # outside the project directory, confirmed empirically). This
          # check verifies both the metadata AND that the real license
          # text is bundled and byte-identical to the repo-root LICENSE,
          # on the real artifact, every push.
          for pkg in sarva sarva_foundry; do
            metadata="$(unzip -p dist/${pkg}-*.whl "*.dist-info/METADATA")"
            if [[ "$metadata" != *"License-Expression: MIT"* ]]; then
              echo "::error::${pkg}'s built wheel METADATA is missing 'License-Expression: MIT'"
              exit 1
            fi
            if ! unzip -p "dist/${pkg}-"*.whl "*.dist-info/licenses/LICENSE" | diff -q - LICENSE > /dev/null; then
              echo "::error::${pkg}'s built wheel is missing a LICENSE file matching the repo root's"
              exit 1
            fi
          done
          uv venv /tmp/sarva-clean-venv --python 3.12
          uv pip install --python /tmp/sarva-clean-venv/bin/python dist/sarva-*.whl
          uv pip install --python /tmp/sarva-clean-venv/bin/python dist/sarva_foundry-*.whl
          output="$(/tmp/sarva-clean-venv/bin/sarva chat 'packaging smoke test')"
          echo "$output"
          if [[ "$output" != *"packaging smoke test"* ]]; then
            echo "::error::sarva chat, run from a clean wheel install, didn't echo the prompt back"
            exit 1
          fi
          /tmp/sarva-clean-venv/bin/python -c "from sarva.providers.foundry_provider import FoundryProvider; from sarva_foundry.model import DecoderOnlyTransformer; print('foundry extra imports cleanly from a clean wheel install')"
          uv pip install --python /tmp/sarva-clean-venv/bin/python faster-whisper
          /tmp/sarva-clean-venv/bin/python -c "from sarva.audio import transcribe; print('audio extra imports cleanly from a clean wheel install')"

  windows-audio:
    # Real verification for the Windows TTS branch of sarva.audio --
    # this dev environment has no Windows machine, so this job (a
    # genuine windows-latest GitHub Actions runner) is what actually
    # exercises sarva.audio.synthesize()'s PowerShell/System.Speech
    # (SAPI) code path end to end, not a mock or a platform.system()
    # monkeypatch standing in for one. See BUILD-JOURNAL.md and
    # core/sarva/audio.py's own module docstring.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync core package only (no torch/foundry needed for this job)
        run: uv sync --package sarva --group dev

      - name: Test the Windows TTS branch for real
        run: uv run pytest tests/conformance/test_audio.py -v

  web:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify core/sarva/server/static/ matches a fresh build
        # Catches the exact risk scripts/build-web.sh exists to prevent: a UI
        # source change committed without also running the build/copy step,
        # leaving `sarva serve` shipping a stale bundle silently.
        run: |
          if ! diff -rq dist ../../core/sarva/server/static; then
            echo "::error::core/sarva/server/static/ is stale — run ./scripts/build-web.sh and commit the result."
            exit 1
          fi

  docs:
    # Every "book" chapter is real Markdown reviewed and edited by hand,
    # but nothing had ever actually run `mkdocs build` against it -- a
    # real, previously-uncaught misconfiguration (docs_dir pointing at a
    # nonexistent nested docs/docs/ directory) meant the site could not
    # build at all until this job's own addition found and fixed it. See
    # BUILD-JOURNAL.md. `--strict` turns broken nav entries/internal
    # links into a real CI failure instead of a silently missing page.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mkdocs
        run: pip install mkdocs mkdocs-material

      - name: Build docs
        run: mkdocs build --strict

  desktop:
    # `cargo check` only — a fast compile/borrow-check pass, not a full
    # release build or cross-platform bundle (.dmg/.msi/.AppImage). Real
    # packaged installers for all platforms are T4 future work (see
    # BUILD-JOURNAL.md); this job exists to catch Rust-side regressions
    # cheaply on every push, not to produce release artifacts.
    #
    # Matrixed across all three target OSes: the sidecar spawn/kill code
    # in lib.rs is `#[cfg(unix)]`-gated in one place (the SIGINT/SIGTERM
    # handler) specifically because it was only ever verified on macOS —
    # this matrix at least catches the far cheaper failure mode of the
    # *rest* of the file not compiling on Linux/Windows at all, which
    # cargo check on a single OS can never surface.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        # Tauri 2's documented Linux prerequisites (webkit2gtk + friends) —
        # cargo check fails at the linking stage without these, not with a
        # clear "install this package" message, so they're listed here
        # explicitly rather than discovered by a confusing CI failure.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Create placeholder sidecar binary
        # tauri-build's build script validates that every bundle.externalBin
        # path actually exists on disk, and fails the whole compile --
        # `cargo check` included, not just a real `tauri build` -- if it
        # doesn't. The real sidecar (scripts/freeze-server.sh) is a
        # PyInstaller-frozen Python binary correctly gitignored as a large,
        # per-platform artifact this repo doesn't commit, which means CI
        # never had one on disk and this job silently couldn't compile at
        # all since the sidecar work landed — caught only by manually
        # running `gh run list` after the fact, not by anything in this
        # file. A placeholder is enough: this job checks compile
        # correctness, not that the sidecar itself works (that's verified
        # locally and recorded in BUILD-JOURNAL.md).
        shell: bash
        run: |
          target_triple="$(rustc -vV | sed -n 's/host: //p')"
          suffix=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then suffix=".exe"; fi
          mkdir -p bin
          touch "bin/sarva-server-${target_triple}${suffix}"
          chmod +x "bin/sarva-server-${target_triple}${suffix}" || true

      - name: cargo check
        run: cargo check --locked
